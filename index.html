<style>

    --border:#e2e2e2;

  *{box-sizing:border-box;}
  body{
    margin:0;

    display:flex;
    min-height:100vh;
  }
  #sidebar{

    padding:20px 0;
    overflow-y:auto;
    height:100vh;
    position:sticky;
    top:0;
  }
  #sidebar .logo{
    text-align:center;
    padding:10px 20px 20px;
    border-bottom:2px solid var(--gold);
    margin-bottom:10px;
  }
  #sidebar .logo h1{
    color:var(--gold);
    font-size:28px;
    margin:0;
    letter-spacing:2px;
  }
  #sidebar .logo p{
    color:#ccc;
    font-size:12px;
    margin:5px 0 0;
  }
  #sidebar nav ul{list-style:none; margin:0; padding:0;}
  #sidebar nav li{
    padding:11px 20px;
    cursor:pointer;
    font-size:13.5px;
    border-right:4px solid transparent;
    transition:.2s;
    display:flex;
    align-items:center;
    gap:8px;
  }
  #sidebar nav li:hover{background:#2a2a2a;}
  #sidebar nav li.active{
    background:#2a2a2a;
    border-right:4px solid var(--gold);
    color:var(--gold);
    font-weight:bold;
  }
  #sidebar nav li svg{flex-shrink:0;}
  #main{
    flex:1;
    padding:40px 60px;
    max-width:1000px;
    margin:0 auto;
    overflow-y:auto;
    height:100vh;
  }
  .section{display:none; animation:fadeIn .3s ease;}
  .section.active{display:block;}
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  h2.section-title{
    color:var(--black);
    border-bottom:4px solid var(--gold);
    padding-bottom:12px;
    margin-bottom:25px;
    font-size:26px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  h3{color:var(--gold-dark); margin-top:25px;}
  p, li{line-height:1.9; font-size:15.5px; color:#333;}
  ul, ol{padding-right:20px;}
  table{
    width:100%;
    border-collapse:collapse;
    margin:20px 0;
    background:var(--white);
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  th{background:var(--black); color:var(--gold); padding:12px; font-size:14px; text-align:right;}
  td{padding:10px 12px; border-bottom:1px solid var(--border); font-size:14px;}
  tr:nth-child(even){background:#fafafa;}
  .note{
    background:#FFF8E1;
    border-right:4px solid var(--gold);
    padding:14px 18px;
    margin:18px 0;
    border-radius:4px;
    font-size:14.5px;
  }
  .warning{
    background:#FFF3E0;
    border-right:4px solid #e65100;
    padding:14px 18px;
    margin:18px 0;
    border-radius:4px;
    font-size:14.5px;
  }
  .source{
    background:#EEF3FB;
    border-right:4px solid #2c5aa0;
    padding:12px 18px;
    margin:14px 0;
    border-radius:4px;
    font-size:13.5px;
    color:#2c3e50;
  }
  .checklist label{display:block; padding:8px 0; font-size:15px; cursor:pointer;}
  .checklist input{margin-left:10px; transform:scale(1.2);}
  .badge{
    display:inline-block;
    background:var(--gold);
    color:var(--black);
    padding:3px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:bold;
    margin-bottom:10px;
  }
  .cover{text-align:center; padding:80px 20px;}
  .cover h1{font-size:34px; color:var(--black);}
  .cover .gold-line{width:120px; height:4px; background:var(--gold); margin:20px auto;}
  .cover p{color:var(--gray); font-size:16px;}
  .nav-buttons{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
    padding-top:20px;
    border-top:1px solid var(--border);
  }
  .nav-buttons button{
    background:var(--black);
    color:var(--gold);
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }
  .nav-buttons button:hover{background:var(--gold-dark); color:var(--black);}
  .faq-item{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:6px;
    margin-bottom:10px;
    padding:14px 18px;
  }
  .faq-item strong{color:var(--gold-dark);}
  @media(max-width:800px){
    body{flex-direction:column;}
    #sidebar{width:100%; height:auto; position:relative;}
    #main{height:auto; padding:20px;}
  }
</style>
</head>

let current = 0;
const navList = document.getElementById('navList');
const content = document.getElementById('content');

sections.forEach((s, i) => {
  const li = document.createElement('li');
  li.innerHTML = (ICONS[s.icon] || '') + '<span>' + s.title + '</span>';
  li.onclick = () => showSection(i);
  li.id = 'nav-' + i;
  navList.appendChild(li);
});

function showSection(i){
  current = i;
  content.innerHTML = sections[i].html;
  document.querySelectorAll('#navList li').forEach((li,idx)=>{
    li.classList.toggle('active', idx===i);
  });
  document.getElementById('main').scrollTop = 0;
}
function goNext(){ if(current < sections.length-1) showSection(current+1); }
function goPrev(){ if(current > 0) showSection(current-1); }

showSection(0);
</script>
